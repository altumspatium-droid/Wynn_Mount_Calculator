<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mount Feeding Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }
        h1 { text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 6px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>Mount Feeding Calculator</h1>

    <h3>Limits</h3>
    <div class="grid">
        <input id="limit0" type="number">
        <input id="limit1" type="number">
        <input id="limit2" type="number">
        <input id="limit3" type="number">
        <input id="limit4" type="number">
        <input id="limit5" type="number">
        <input id="limit6" type="number">
        <input id="limit7" type="number">
    </div>

    <h3>Maxes</h3>
    <div class="grid">
        <input id="max0" type="number">
        <input id="max1" type="number">
        <input id="max2" type="number">
        <input id="max3" type="number">
        <input id="max4" type="number">
        <input id="max5" type="number">
        <input id="max6" type="number">
        <input id="max7" type="number">
    </div>

    <button onclick="calculate()">Calculate Feeding Advice</button>

    <div id="output"></div>

    <!-- GLPK.js (MILP solver) -->
    <script src="https://unpkg.com/glpk.js@0.19.0/dist/glpk.min.js"></script>

<script>
let glpkInstance = null;

// Initialize GLPK
GLPK().then(glpk => {
    glpkInstance = glpk;
});

// ------------------------------
// MATERIAL TABLES
// ------------------------------
function getMatsOfLevel(n) {
    let low, lowmid, mid, highmid, high;

    if (n === 0)      [low, lowmid, mid, highmid, high] = [2, 4, 4, 6, 8];
    else if (n === 1) [low, lowmid, mid, highmid, high] = [2, 5, 5, 8, 10];
    else if (n === 2) [low, lowmid, mid, highmid, high] = [3, 5, 6, 9, 12];
    else if (n === 3) [low, lowmid, mid, highmid, high] = [3, 6, 6, 11, 14];
    else if (n === 4) [low, lowmid, mid, highmid, high] = [3, 6, 7, 12, 16];
    else if (n === 5) [low, lowmid, mid, highmid, high] = [4, 7, 8, 14, 18];
    else if (n === 6) [low, lowmid, mid, highmid, high] = [4, 8, 9, 15, 20];
    else if (n === 7) [low, lowmid, mid, highmid, high] = [4, 8, 10, 17, 22];
    else if (n === 8) [low, lowmid, mid, highmid, high] = [4, 9, 10, 18, 24];
    else if (n === 9) [low, lowmid, mid, highmid, high] = [5, 9, 11, 20, 26];
    else if (n === 10) [low, lowmid, mid, highmid, high] = [5, 10, 12, 21, 28];
    else if (n === 11) [low, lowmid, mid, highmid, high] = [5, 10, 12, 22, 29];
    else if (n === 12) [low, lowmid, mid, highmid, high] = [5, 11, 13, 23, 30];
    else if (n === 13) [low, lowmid, mid, highmid, high] = [5, 11, 13, 23, 31];

    return {
        ingot:  [0, 0, 0, lowmid, 0, high, 0, 0],
        gem:    [mid, 0, 0, low, 0, 0, 0, highmid],
        plank:  [low, highmid, 0, 0, 0, mid, 0, 0],
        paper:  [0, 0, high, 0, 0, 0, lowmid, 0],
        string: [0, low, 0, 0, mid, 0, highmid, 0],
        grains: [high, 0, lowmid, 0, 0, 0, 0, 0],
        oil:    [0, 0, low, 0, highmid, 0, 0, mid],
        meat:   [0, lowmid, 0, high, 0, 0, 0, 0]
    };
}

// ------------------------------
// FINALMOUNT CLASS
// ------------------------------
class FinalMount {
    constructor(limits, maxes) {
        this.limits = limits.slice();
        this.maxes = maxes.slice();
        this.eaten = [];
    }

    getFoodTier(specialLimits = null) {
        const lims = specialLimits || this.limits;
        let maxLimit = 0;

        for (let i = 0; i < lims.length; i++) {
            maxLimit = Math.max(maxLimit, Math.min(lims[i], this.maxes[i]));
        }

        if (maxLimit < 10) return 0;
        if (maxLimit < 20) return 1;
        if (maxLimit < 30) return 2;
        if (maxLimit < 40) return 3;
        if (maxLimit < 50) return 4;
        if (maxLimit < 60) return 5;
        if (maxLimit < 70) return 6;
        if (maxLimit < 80) return 7;
        if (maxLimit < 90) return 8;
        if (maxLimit < 100) return 9;
        if (maxLimit < 105) return 10;
        if (maxLimit < 110) return 11;
        if (maxLimit < 115) return 12;
        return 13;
    }

    getMaxFoodTier() {
        let maxLimit = Math.max(...this.maxes);

        if (maxLimit < 10) return 0;
        if (maxLimit < 20) return 1;
        if (maxLimit < 30) return 2;
        if (maxLimit < 40) return 3;
        if (maxLimit < 50) return 4;
        if (maxLimit < 60) return 5;
        if (maxLimit < 70) return 6;
        if (maxLimit < 80) return 7;
        if (maxLimit < 90) return 8;
        if (maxLimit < 100) return 9;
        if (maxLimit < 105) return 10;
        if (maxLimit < 110) return 11;
        if (maxLimit < 115) return 12;
        return 13;
    }

    isAtMaxFoodTier() {
        return this.getFoodTier() === this.getMaxFoodTier();
    }

    getCurrentMats(matsLists) {
        return matsLists[this.getFoodTier()];
    }

    // MILP solver using GLPK.js
    findFeedPlan(matsLists) {
        if (!glpkInstance) {
            throw new Error("Solver not ready yet. Please wait a moment and try again.");
        }

        const mats = this.getCurrentMats(matsLists);
        const names = Object.keys(mats);
        const nSkills = this.limits.length;

        const needed = this.maxes.map((m, i) => Math.max(0, m - this.limits[i]));
        if (!needed.some(v => v > 0)) return {};

        // Build A matrix: skills x materials
        const A = [];
        for (let j = 0; j < nSkills; j++) {
            const row = [];
            for (const name of names) {
                row.push(mats[name][j]);
            }
            A.push(row);
        }

        const activeSkills = [];
        for (let j = 0; j < nSkills; j++) {
            if (needed[j] > 0) activeSkills.push(j);
        }

        // Filter useful materials
        const usefulIdx = [];
        for (let i = 0; i < names.length; i++) {
            let useful = false;
            for (const j of activeSkills) {
                if (A[j][i] > 0) {
                    useful = true;
                    break;
                }
            }
            if (useful) usefulIdx.push(i);
        }
        if (usefulIdx.length === 0) return {};

        const usefulNames = usefulIdx.map(i => names[i]);

        // Build GLPK problem
        const vars = usefulNames.map((name, idx) => ({
            name: `x${idx}`,
            coef: 1
        }));

        const subjectTo = [];
        for (const j of activeSkills) {
            const rowVars = usefulIdx.map((i, idx) => ({
                name: `x${idx}`,
                coef: A[j][i]
            }));
            subjectTo.push({
                name: `skill_${j}`,
                vars: rowVars,
                bnds: {
                    type: glpkInstance.GLP_LO,
                    ub: 0,
                    lb: needed[j]
                }
            });
        }

        const generals = usefulNames.map((_, idx) => `x${idx}`);

        const lp = {
            name: "feedplan",
            objective: {
                direction: glpkInstance.GLP_MIN,
                name: "total_items",
                vars: vars
            },
            subjectTo: subjectTo,
            generals: generals
        };

        const result = glpkInstance.solve(lp);

        if (result.result.status !== glpkInstance.GLP_OPT) {
            throw new Error("Could not find an optimal feeding plan.");
        }

        const plan = {};
        for (let idx = 0; idx < usefulNames.length; idx++) {
            const varName = `x${idx}`;
            const val = Math.round(result.result.vars[varName]);
            if (val > 0) {
                plan[usefulNames[idx]] = val;
            }
        }

        return plan;
    }

    applyPlanUntilNewTier(matsLists, plan) {
        const mats = this.getCurrentMats(matsLists);
        const tier = this.getFoodTier();

        const order = ["grains", "gem", "paper", "ingot", "plank", "string", "oil", "meat"];

        for (const name of order) {
            if (!plan[name]) continue;

            const vec = mats[name];
            for (let k = 0; k < plan[name]; k++) {
                this.eaten.push(`${name} (tier ${tier})`);
                for (let i = 0; i < 8; i++) {
                    this.limits[i] = Math.min(this.maxes[i], this.limits[i] + vec[i]);
                }
                if (this.getFoodTier() > tier) return;
            }
        }
    }

    applyPlan(mats, plan) {
        const tier = this.getFoodTier();
        for (const [name, count] of Object.entries(plan)) {
            const vec = mats[name];
            for (let k = 0; k < count; k++) {
                this.eaten.push(`${name} (tier ${tier})`);
                for (let i = 0; i < 8; i++) {
                    this.limits[i] = Math.min(this.maxes[i], this.limits[i] + vec[i]);
                }
            }
        }
    }

    fullyEat(matsLists) {
        while (!this.isAtMaxFoodTier()) {
            const plan = this.findFeedPlan(matsLists);
            this.applyPlanUntilNewTier(matsLists, plan);
        }
        const plan = this.findFeedPlan(matsLists);
        this.applyPlan(this.getCurrentMats(matsLists), plan);
    }
}

// ------------------------------
// MAIN CALCULATE FUNCTION
// ------------------------------
function calculate() {
    if (!glpkInstance) {
        document.getElementById("output").innerText =
            "Solver is still loading. Please wait a moment and try again.";
        return;
    }

    const limits = [];
    const maxes = [];

    for (let i = 0; i < 8; i++) {
        limits.push(parseInt(document.getElementById(`limit${i}`).value || "0"));
        maxes.push(parseInt(document.getElementById(`max${i}`).value || "0"));
    }

    const matsLists = [];
    for (let i = 0; i < 14; i++) matsLists.push(getMatsOfLevel(i));

    try {
        const mount = new FinalMount(limits, maxes);
        mount.fullyEat(matsLists);

        document.getElementById("output").innerText =
            mount.eaten.join("\n");
    } catch (e) {
        document.getElementById("output").innerText =
            "Error while solving:\n" + e.message;
    }
}
</script>

</body>
</html>
